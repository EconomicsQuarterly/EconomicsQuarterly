<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Crossword - Economics Quarterly</title>
    <link rel="stylesheet" href="global-stylesheets/index.css">
    <style>
        .crossword-layout {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            font-family: sans-serif;
        }
        iframe {
            width: 100%;
            height: 700px;
            border: none;
        }
    </style>
</head>
<body>

<div class="crossword-layout">
    <h1>Daily Economic Crossword</h1>
    <p id="puzzle-date">Loading today's puzzle...</p>

    <iframe id="crossword-frame" src="https://crosswordlabs.com/embed/economics-daily-puzzle"></iframe>
</div>

<script>
    // Dynamically fetch the current day's backend data to update the page heading
    fetch('assets/data/today-crossword.json')
        .then(response => response.json())
        .then(data => {
            document.getElementById('puzzle-date').innerText = "Puzzle for: " + data.date;
        })
        .catch(err => console.error("Could not fetch daily metadata:", err));
</script>
</body>
</html>
