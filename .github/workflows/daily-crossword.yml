name: Generate Daily Crossword

on:
  schedule:
    - cron: '0 0 * * *' # Runs automatically every night at midnight UTC
  workflow_dispatch: # Allows you to manually trigger it from GitHub anytime

jobs:
  update-crossword:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Crossword Data
        run: |
          mkdir -p assets/data
          # This creates a dummy JSON file structure for today's puzzle. 
          # In the future, your script will overwrite this with real economic terms.
          echo '{"date": "'$(date +%F)'", "words": ["inflation", "tariff", "liquidity"]}' > assets/data/today-crossword.json

      - name: Commit and Push Update
        run: |
          git config --global user.name "Github Actions Bot"
          git config --global user.email "actions@github.com"
          git add assets/data/today-crossword.json
          git commit -m "Automated Daily Crossword Update" || exit 0
          git push