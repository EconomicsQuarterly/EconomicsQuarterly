name: Generate Daily Crossword

on:
  schedule:
    - cron: '0 0 * * *' # Runs automatically every night at midnight UTC
  workflow_dispatch: # Allows you to manually trigger it from GitHub anytime

# CRITICAL FIX: Grants the automation bot explicit permission to push code updates back to your repo
permissions:
  contents: write

jobs:
  update-crossword:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Creates a package.json automatically if you don't have one, preventing npm install crashes
      - name: Ensure Node Environment Exists
        run: |
          if [ ! -f package.json ]; then
            npm init -y
          fi

      - name: Generate Crossword Data
        run: node scripts/generate-crossword.js

      - name: Commit and Push Update
        run: |
          git config --global user.name "Github Actions Bot"
          git config --global user.email "actions@github.com"
          git add assets/data/today-crossword.json
          git commit -m "Automated Daily Crossword Update" || exit 0
          git push